# Carrillo Tech Solutions — Sveltia CMS Configuration

backend:
  name: github
  repo: CarrilloTechLLC/CTS
  branch: main
  base_url: https://carrillotech.pages.dev

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

media_libraries:
  default:
    config:
      max_file_size: 24000000
      slugify_filename: true

site_url: https://carrillotech.pages.dev

collections:

  # Blog / Intelligence Hub
  - name: "blog"
    label: "Intelligence Hub — Blog"
    label_singular: "Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "dispatch?post={{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Post headline" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Hardware", "Networking", "Data", "AI", "Security", "Tutorial", "Service Guide", "Social Commentary"]
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown in cards and archive previews (1-2 sentences)" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Toggle to save without publishing"

  # Creative Archive
  - name: "creative"
    label: "Creative Archive"
    label_singular: "Creative Piece"
    folder: "_creative"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/creative/?piece={{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Song, poem, manuscript, or creative piece title" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on the Creative Archive page" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Beat Source Link (YouTube/SoundCloud)", name: "beat_source", widget: "string", required: false, hint: "Paste a YouTube or SoundCloud URL here. Leave blank if you are uploading an audio file below." }
      - label: "Beat Audio Upload (MP3/M4A/OGG under 24MB)"
        name: "beat_file"
        widget: "file"
        required: false
        multiple: false
        choose_url: false
        accept: "audio/mpeg,audio/ogg,audio/mp4,audio/x-m4a,.mp3,.ogg,.m4a"
        media_folder: "assets/music"
        public_folder: "/assets/music"
        hint: "Upload an optimized audio file directly from the admin portal. MP3 is recommended. Keep every file under 24MB so Cloudflare Pages can deploy it."
      - { label: "BPM", name: "bpm", widget: "string", required: false, hint: "Example: 80 BPM" }
      - { label: "Musical Key", name: "musical_key", widget: "string", required: false, hint: "Example: A Minor" }
      - { label: "Genre", name: "genre", widget: "string", required: false, hint: "Example: Gaming Rap" }
      - { label: "Body", name: "body", widget: "markdown", hint: "Paste lyrics or manuscript text exactly as the line breaks should appear." }
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "On = appears in the Drafting Room. Off = finalized published piece."

  # Portfolio
  - name: "portfolio"
    label: "Infrastructure Portfolio"
    label_singular: "Project"
    folder: "_portfolio"
    create: true
    slug: "{{slug}}"
    preview_path: "portfolio/{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Hardware", "Network", "Data", "AI", "Security", "Consulting"] }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Active", value: "active" }
          - { label: "Complete", value: "complete" }
          - { label: "Archived", value: "archived" }
      - { label: "Short Summary", name: "summary", widget: "text", hint: "2-3 sentence overview for the card" }
      - { label: "Full Description", name: "body", widget: "markdown" }
      - label: "Tech Stack Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "e.g. OBS Studio, Capture Card, Python"
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Pin to top of portfolio grid"

  # Enterprise Services
  - name: "services"
    label: "Enterprise Services"
    label_singular: "Service"
    folder: "_services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Service Name", name: "title", widget: "string" }
      - { label: "Sort Order", name: "order", widget: "number", value_type: "int", min: 1 }
      - { label: "Icon (FontAwesome class)", name: "icon", widget: "string", hint: "e.g. fas fa-server" }
      - { label: "Short Description", name: "summary", widget: "text", hint: "Shown on service card" }
      - { label: "Full Details", name: "body", widget: "markdown" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "e.g. Workstations, Component Repair"
      - label: "Featured (Highlighted Card)"
        name: "featured"
        widget: "boolean"
        default: false


  # Project Media & Assets
  - name: "media_assets"
    label: "Project Media & Assets"
    label_singular: "Media Asset"
    folder: "_media_assets"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Example: Cleveland FiveM Police Livery Preview" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Related Project", name: "project", widget: "string", hint: "Example: FiveM Cleveland RP Server" }
      - label: "Asset Type"
        name: "asset_type"
        widget: "select"
        options: ["Cleveland-Themed Asset", "FiveM Livery", "UI Configuration", "Server Trailer", "Screenshot", "Brand Asset", "Documentation Image", "Other"]
      - { label: "Media Image", name: "image", widget: "image", required: false, hint: "Upload the screenshot, livery preview, UI capture, or project visual." }
      - { label: "Video / Trailer Link", name: "video_url", widget: "string", required: false, hint: "Optional YouTube, Twitch, or video URL." }
      - { label: "Alt Text", name: "alt_text", widget: "text", required: false, hint: "Describe the image for blind or low-vision visitors." }
      - { label: "Caption", name: "caption", widget: "text", hint: "Brief caption explaining what the viewer is looking at." }
      - { label: "Purpose / Why This Media Was Selected", name: "purpose", widget: "text", hint: "Explain how the visual supports communication, training, environment design, or user experience." }
      - { label: "Detailed Notes", name: "body", widget: "markdown", required: false }
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Turn on to save without showing it on the live site."

  # Hardware Configuration Documentation
  - name: "hardware_configurations"
    label: "Hardware Configuration Docs"
    label_singular: "Hardware Configuration"
    folder: "_hardware_configurations"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Example: i5-9400F / GTX 1650 Super Workstation Layout" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Hardware Type", name: "hardware_type", widget: "select", options: ["Desktop PC", "Laptop", "Streaming Setup", "Network Setup", "Peripheral Setup", "Repair Documentation", "Other"] }
      - { label: "Core Specs", name: "specs", widget: "text", hint: "CPU, GPU, RAM, storage, OS, and other key specs." }
      - { label: "Photo", name: "image", widget: "image", required: false, hint: "Upload a real photo or screenshot of the build/configuration." }
      - { label: "Alt Text", name: "alt_text", widget: "text", required: false, hint: "Describe the image for screen readers." }
      - { label: "Caption", name: "caption", widget: "text", hint: "Explain what the photo shows." }
      - { label: "Preparation / Organization Note", name: "organization_note", widget: "text", hint: "Explain cable management, layout, airflow, labeling, file organization, or setup choices." }
      - { label: "End-User Benefit", name: "end_user_benefit", widget: "text", hint: "Explain how the setup helps the user: easier maintenance, better airflow, cleaner troubleshooting, safer use, etc." }
      - { label: "Full Documentation", name: "body", widget: "markdown", required: false }
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false

  # Instructional Use / Service Guides
  - name: "service_guides"
    label: "Instructional Use — Service Guides"
    label_singular: "Service Guide"
    folder: "_service_guides"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Guide Title", name: "title", widget: "string", hint: "Example: How to Document a Basic IT Support Issue" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Guide Type"
        name: "guide_type"
        widget: "select"
        options: ["How-To", "Service Guide", "Troubleshooting", "Client Instructions", "School Evidence", "Checklist"]
      - { label: "Skill Area", name: "skill_area", widget: "string", hint: "Example: Windows Support, Hardware, Networking, OBS, GitHub Pages" }
      - { label: "Featured Image / Screenshot", name: "image", widget: "image", required: false }
      - { label: "Alt Text", name: "alt_text", widget: "text", required: false, hint: "Describe the screenshot or image for blind users." }
      - { label: "Short Summary", name: "summary", widget: "text", hint: "Shown on the live Service Guides section." }
      - { label: "Audio-Visual Method Used", name: "av_method", widget: "text", hint: "Example: Text instructions with screenshots, captions, and visual callouts." }
      - { label: "Body", name: "body", widget: "markdown", hint: "Write the full guide here. Use headings, steps, screenshots, captions, and links." }
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false

  # Site Settings (singleton)
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "_data/settings.yml"
        fields:
          - { label: "Site Title",   name: "site_title",   widget: "string",   default: "Carrillo Tech Solutions" }
          - { label: "Tagline",      name: "tagline",      widget: "string",   default: "Engineered for Performance. Secured for the Future." }
          - { label: "Owner Name",   name: "owner",        widget: "string",   default: "Giovanni Carrillo" }
          - { label: "Location",     name: "location",     widget: "string",   default: "Cleveland, Ohio" }
          - { label: "Email",        name: "email",        widget: "string" }
          - { label: "Twitch Handle",name: "twitch",       widget: "string",   default: "supergman2155" }
          - { label: "YouTube Handle",name: "youtube",     widget: "string",   default: "supergman215" }
          - { label: "Instagram",    name: "instagram",    widget: "string",   default: "G.io215" }
          - { label: "LinkedIn URL", name: "linkedin",     widget: "string" }
          - { label: "Hero Headline",name: "hero_headline",widget: "string" }
          - { label: "Hero Subheadline", name: "hero_sub", widget: "text" }
          - label: "Availability Status"
            name: "available"
            widget: "boolean"
            default: true
            hint: "Controls the 'Available for Deployment' badge"
